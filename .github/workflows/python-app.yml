name: Python application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-dev \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest
